---
databaseChangeLog:
  - changeSet:
      id: "0"
      author: "mirjalal"
      sql:
        - CREATE SCHEMA IF NOT EXISTS public;
  - changeSet:
      id: "1"
      author: "mirjalal"
      changes:
        - createTable:
            schemaName: public
            tableName: dictionaries
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR
  - changeSet:
      id: "2"
      author: "mirjalal"
      changes:
        - createTable:
            schemaName: public
            tableName: words
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: word
                  type: VARCHAR
              - column:
                  name: translation
                  type: VARCHAR
              - column:
                  name: dictionary_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_word_dictionary
            baseTableSchemaName: public
            baseTableName: words
            baseColumnNames: dictionary_id
            referencedTableSchemaName: public
            referencedTableName: dictionaries
            referencedColumnNames: id
