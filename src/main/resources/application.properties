spring.application.name=kogeneesti

spring.datasource.url=${KOGENEESTI_JDBC_URL:jdbc:postgresql://localhost:5432/kogeneesti}
spring.datasource.username=${KOGENEESTI_DB_USERNAME:postgres}
spring.datasource.password=${KOGENEESTI_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=50MB

server.port=8080

app.storage.location=${KOGENEESTI_STORAGE_LOCATION:/tmp/kogeneesti-storage}

app.cors.allowed-origins=${KOGENEESTI_CORS_ALLOWED_ORIGINS:http://192.168.1.200:5173}
app.cors.allowed-methods=${KOGENEESTI_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
app.cors.allowed-headers=${KOGENEESTI_CORS_ALLOWED_HEADERS:*}

